<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiHuman - AI 视频生产线</title>
<style>
:root {
  --bg: #0c0e14; --bg2: #141620; --bg3: #1a1d2e; --border: #262a3d;
  --text: #d0d4e0; --text2: #8890a8; --white: #f0f2f8;
  --purple: #7c5cfc; --purple2: #6344e8; --purple-bg: rgba(124,92,252,.12);
  --green: #34d399; --green-bg: rgba(52,211,153,.1);
  --red: #f87171; --red-bg: rgba(248,113,113,.1);
  --blue: #60a5fa; --yellow: #fbbf24;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.header .logo { font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; }
.header .logo span { color: var(--purple); }
.header .badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 500; }
.badge-online { background: var(--green-bg); color: var(--green); }
.badge-offline { background: var(--red-bg); color: var(--red); }
.header .gpu-tag { font-size: 12px; color: var(--text2); background: var(--bg3); padding: 4px 12px; border-radius: 6px; }

/* Steps container */
.pipeline { padding: 24px 32px 60px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
@media (max-width: 1400px) { .pipeline { grid-template-columns: 1fr 1fr; } }
@media (max-width: 900px) { .pipeline { grid-template-columns: 1fr; } }

/* Step card */
.step { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.step-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--purple); color: #fff; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-num.done { background: var(--green); }
.step-title { font-size: 16px; font-weight: 600; color: var(--white); }
.step-status { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 8px; }
.step-body { padding: 16px 20px; }

/* Form elements */
.fg { margin-bottom: 14px; }
.fg:last-child { margin-bottom: 0; }
.fg label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
.fg input, .fg textarea, .fg select {
  width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; outline: none; transition: border .15s; font-family: inherit;
}
.fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--purple); }
.fg textarea { resize: vertical; min-height: 90px; }
.fg .hint { font-size: 11px; color: var(--text2); margin-top: 3px; opacity: .7; }
.fg-row { display: flex; gap: 10px; }
.fg-row .fg { flex: 1; }
.fg input[type="file"] { padding: 7px; }
.fg input[type="color"] { padding: 3px; height: 38px; cursor: pointer; }
.fg input[type="number"] { -moz-appearance: textfield; }

.cb { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
.cb input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--purple); cursor: pointer; }
.cb label { font-size: 13px; color: var(--text); cursor: pointer; margin: 0; }

.radio-row { display: flex; gap: 16px; margin-bottom: 12px; }
.radio-row label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); cursor: pointer; }
.radio-row input[type="radio"] { accent-color: var(--purple); cursor: pointer; }

/* Buttons */
.btn {
  padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
  transition: all .2s; display: inline-flex; align-items: center; gap: 8px; width: 100%;
  justify-content: center; letter-spacing: 0.3px;
}
.btn-main { background: var(--purple); color: #fff; }
.btn-main:hover { background: var(--purple2); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(124,92,252,.3); }
.btn-main:disabled { background: #3d3570; color: #8878c0; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-sm { padding: 6px 14px; font-size: 12px; width: auto; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--purple); color: var(--purple); }

/* Spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Result & preview */
.result { margin-top: 14px; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-family: "SF Mono", Monaco, monospace; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; display: none; }
.result.ok { border-color: #166534; }
.result.err { border-color: #7f1d1d; color: var(--red); }
.result.show { display: block; }
.preview { margin-top: 12px; }
.preview audio { width: 100%; border-radius: 8px; }
.preview video { width: 100%; border-radius: 8px; max-height: 360px; background: #000; }
.file-tag { display: inline-block; padding: 3px 10px; background: var(--purple-bg); color: var(--purple); border-radius: 6px; font-size: 11px; font-weight: 600; margin-top: 6px; cursor: pointer; user-select: all; }
.dl-link { color: var(--blue); text-decoration: none; font-size: 12px; }
.dl-link:hover { text-decoration: underline; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* Upload area */
.upload-area {
  border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center;
  cursor: pointer; transition: all .2s; position: relative;
}
.upload-area:hover { border-color: var(--purple); background: var(--purple-bg); }
.upload-area.has-file { border-color: var(--green); background: var(--green-bg); }
.upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-area .icon { font-size: 28px; margin-bottom: 6px; }
.upload-area .text { font-size: 13px; color: var(--text2); }
.upload-area .filename { font-size: 13px; color: var(--green); font-weight: 600; }

/* Progress bar */
.progress-wrap { margin-top: 10px; display: none; }
.progress-wrap.show { display: block; }
.progress-bar-outer { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--purple), var(--blue)); border-radius: 3px; transition: width .3s ease; width: 0%; }
.progress-info { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 11px; color: var(--text2); }
.progress-step { color: var(--purple); font-weight: 500; }
.progress-pct { color: var(--blue); font-weight: 600; }

/* Status log at bottom */
.log-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 6px 32px; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 12px; z-index: 100; }
.log-bar .dot { width: 6px; height: 6px; border-radius: 50%; }
.log-bar .dot.on { background: var(--green); }
.log-bar .dot.off { background: var(--red); }

/* History dropdown */
.history-select {
  width: 100%; padding: 5px 10px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 12px; outline: none; cursor: pointer;
  margin-top: 8px; display: none;
}
.history-select:focus { border-color: var(--purple); }
.history-select.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Digi<span>Human</span></div>
  <span class="badge" id="statusBadge">--</span>
  <span class="gpu-tag" id="gpuInfo">GPU: --</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <select id="project-select" onchange="onProjectSelect(this.value)" style="padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;min-width:200px">
      <option value="">-- 选择项目 --</option>
    </select>
    <button onclick="createNewProject()" class="btn btn-outline btn-sm" style="white-space:nowrap">新建项目</button>
    <button onclick="deleteCurrentProject()" class="btn btn-outline btn-sm" style="white-space:nowrap;color:var(--red);border-color:var(--red)" title="删除当前项目">删除</button>
  </div>
</div>

<div class="pipeline">

  <!-- ==================== STEP 1: 抖音视频处理 ==================== -->
  <div class="step" id="step1">
    <div class="step-header">
      <div class="step-num" id="sn1">1</div>
      <div class="step-title">抖音视频处理</div>
    </div>
    <select class="history-select" id="history-douyin" onchange="onHistorySelect('douyin', this.value)"></select>
    <div class="step-body">
      <div class="fg">
        <label>抖音分享链接</label>
        <input type="text" id="dy-link" placeholder="粘贴抖音分享链接...">
      </div>
      <button class="btn btn-main" id="btn-dy-extract" onclick="douyinExtract()">提取文案</button>

      <div style="display:flex;align-items:center;gap:10px;margin:14px 0">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:12px;color:var(--text2);white-space:nowrap">或从已下载视频选择</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>

      <div class="fg">
        <select id="dy-existing" style="cursor:pointer">
          <option value="">加载中...</option>
        </select>
      </div>
      <div class="preview" id="dy-existing-preview" style="margin-bottom:12px"></div>
      <div id="dy-existing-projects" style="display:none;margin-bottom:12px"></div>
      <button class="btn btn-main" id="btn-dy-existing" onclick="douyinTranscribeExisting()" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" disabled>重新提取文案</button>

      <div class="progress-wrap" id="dy-progress"><div class="progress-bar-outer"><div class="progress-bar-inner" id="dy-progress-bar"></div></div><div class="progress-info"><span class="progress-step" id="dy-progress-step"></span><span class="progress-pct" id="dy-progress-pct"></span></div></div>
      <div class="result" id="dy-res"></div>
      <div class="preview" id="dy-preview"></div>
    </div>
  </div>

  <!-- ==================== STEP 2: 文案生成 ==================== -->
  <div class="step" id="step2">
    <div class="step-header">
      <div class="step-num" id="sn2">2</div>
      <div class="step-title">文案生成</div>
    </div>
    <select class="history-select" id="history-script" onchange="onHistorySelect('script', this.value)"></select>
    <div class="step-body">
      <div class="fg">
        <label>视频文案</label>
        <textarea id="script-text" placeholder="从抖音提取后自动填入，也可以手动输入或修改..." rows="6"></textarea>
        <div class="hint">提取抖音文案后会自动填入此处，你可以手动修改</div>
      </div>
      <div class="divider"></div>
      <div class="fg">
        <label>仿写模式</label>
        <div class="radio-row">
          <label><input type="radio" name="rewrite-mode" value="none" checked> 不改写</label>
          <label><input type="radio" name="rewrite-mode" value="auto"> 自动仿写</label>
          <label><input type="radio" name="rewrite-mode" value="custom"> 自定义指令</label>
        </div>
      </div>
      <div class="fg" id="rewrite-instruction-group" style="display:none">
        <label>改写指令</label>
        <textarea id="rewrite-instruction" placeholder="例如：改为更加口语化的风格..." rows="2"></textarea>
      </div>
      <button class="btn btn-main" id="btn-rewrite" onclick="rewriteScript()">执行改写</button>
      <div class="result" id="rewrite-res"></div>
    </div>
  </div>

  <!-- ==================== STEP 3: 音频生成 ==================== -->
  <div class="step" id="step3">
    <div class="step-header">
      <div class="step-num" id="sn3">3</div>
      <div class="step-title">音频生成</div>
    </div>
    <select class="history-select" id="history-voice" onchange="onHistorySelect('voice', this.value)"></select>
    <div class="step-body">
      <div class="fg-row">
        <div class="fg">
          <label>选择音色</label>
          <div style="display:flex;gap:6px">
            <select id="v-speaker" style="flex:1"><option value="">加载中...</option></select>
            <button class="btn btn-outline btn-sm" onclick="refreshSpeakers()">刷新</button>
          </div>
        </div>
        <div class="fg">
          <label>语速调节</label>
          <input type="number" id="v-speed" value="1.0" min="0.5" max="2.0" step="0.1">
          <div class="hint">推荐范围 0.8-1.2</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="fg">
        <label>零样本克隆（可选）</label>
        <div class="hint" style="margin-bottom:8px">上传参考音频可以克隆该音色，留空则使用上方音色</div>
      </div>
      <div class="fg">
        <label>参考音频</label>
        <input type="file" id="v-prompt-audio" accept="audio/*">
      </div>
      <div class="fg">
        <label>参考音频文本</label>
        <input type="text" id="v-prompt-text" placeholder="参考音频里说的话（克隆时必填）">
      </div>
      <button class="btn btn-main" id="btn-tts" onclick="generateAudio()">生成音频</button>
      <div class="progress-wrap" id="tts-progress"><div class="progress-bar-outer"><div class="progress-bar-inner" id="tts-progress-bar"></div></div><div class="progress-info"><span class="progress-step" id="tts-progress-step"></span><span class="progress-pct" id="tts-progress-pct"></span></div></div>
      <div class="result" id="tts-res"></div>
      <div class="preview" id="tts-preview"></div>
    </div>
  </div>

  <!-- ==================== STEP 4: 视频生成 ==================== -->
  <div class="step" id="step4">
    <div class="step-header">
      <div class="step-num" id="sn4">4</div>
      <div class="step-title">视频生成</div>
    </div>
    <select class="history-select" id="history-digital_human" onchange="onHistorySelect('digital_human', this.value)"></select>
    <div class="step-body">
      <div class="fg">
        <label>选择数字人模型</label>
        <div style="display:flex;gap:6px">
          <select id="dh-face" style="flex:1"><option value="">加载中...</option></select>
          <button class="btn btn-outline btn-sm" onclick="refreshFaces()">刷新</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="fg">
        <label>上传参考视频（可选，替代数字人模型）</label>
        <div class="upload-area" id="upload-video-area">
          <input type="file" id="upload-video-file" accept="video/*" onchange="onVideoFileSelected(this)">
          <div class="icon">+</div>
          <div class="text">点击或拖拽上传视频文件</div>
        </div>
        <div class="hint">支持 mp4/mov/avi，上传后将替代数字人模型</div>
      </div>
      <div class="fg" id="upload-video-info" style="display:none">
        <div class="file-tag" id="upload-video-tag"></div>
      </div>
      <div class="divider"></div>
      <div class="fg">
        <label>高级参数</label>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Batch Size</label>
          <input type="number" id="dh-batch" value="4" min="1" max="32">
        </div>
        <div class="fg">
          <label>运行时</label>
          <select id="dh-runtime">
            <option value="auto" selected>auto（自动选择）</option>
            <option value="tensorrt">tensorrt（L20 推荐）</option>
            <option value="cuda">cuda</option>
            <option value="cpu">cpu</option>
          </select>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>音画偏移</label>
          <input type="number" id="dh-sync-offset" value="0" step="1">
        </div>
        <div class="fg">
          <label>纵向融合比例</label>
          <input type="number" id="dh-scale-h" value="1.6" min="0.5" max="4.0" step="0.1">
        </div>
        <div class="fg">
          <label>横向融合比例</label>
          <input type="number" id="dh-scale-w" value="3.6" min="0.5" max="6.0" step="0.1">
        </div>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:14px">
        <div class="cb">
          <input type="checkbox" id="dh-compress">
          <label for="dh-compress">压缩推理</label>
        </div>
        <div class="cb">
          <input type="checkbox" id="dh-beautify-teeth">
          <label for="dh-beautify-teeth">牙齿优化</label>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>音频 file_id（可选，不填自动使用上一步）</label>
          <input type="text" id="dh-audio-override" placeholder="自动使用步骤3的结果">
        </div>
      </div>
      <div class="hint" style="margin-top:-6px;margin-bottom:12px">L20 机器优先试 `tensorrt`；嘴角生硬时优先微调 `音画偏移`、`纵向融合比例`、`横向融合比例` 和 `牙齿优化`。</div>
      <button class="btn btn-main" id="btn-dh" onclick="generateVideo()">生成数字人视频</button>
      <div class="hint" style="margin-top:6px">通常需要 30-60 秒</div>
      <div class="progress-wrap" id="dh-progress"><div class="progress-bar-outer"><div class="progress-bar-inner" id="dh-progress-bar"></div></div><div class="progress-info"><span class="progress-step" id="dh-progress-step"></span><span class="progress-pct" id="dh-progress-pct"></span></div></div>
      <div class="result" id="dh-res"></div>
      <div class="preview" id="dh-preview"></div>
    </div>
  </div>

  <!-- ==================== STEP 5: 字幕生成 ==================== -->
  <div class="step" id="step5">
    <div class="step-header">
      <div class="step-num" id="sn5">5</div>
      <div class="step-title">字幕生成</div>
    </div>
    <select class="history-select" id="history-subtitle" onchange="onHistorySelect('subtitle', this.value)"></select>
    <div class="step-body">
      <div class="fg-row">
        <div class="fg">
          <label>选择字体</label>
          <select id="sub-font">
            <option value="">默认字体</option>
            <option value="AlimamaShanHeiTi">阿里妈妈善黑体</option>
          </select>
        </div>
        <div class="fg">
          <label>选择描边粗细</label>
          <select id="sub-outline">
            <option value="1">1 (细)</option>
            <option value="2" selected>2 (正常)</option>
            <option value="3">3 (粗)</option>
          </select>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>字体大小</label>
          <input type="number" id="sub-size" value="24" min="8" max="72">
        </div>
        <div class="fg">
          <label>描边距底 (px)</label>
          <input type="number" id="sub-margin" value="30" min="0" max="200">
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>字体颜色</label>
          <input type="color" id="sub-color" value="#FFFFFF">
        </div>
        <div class="fg">
          <label>描边颜色</label>
          <input type="color" id="sub-outline-color" value="#000000">
        </div>
      </div>
      <button class="btn btn-main" id="btn-sub" onclick="generateSubtitle()">生成字幕</button>
      <div class="progress-wrap" id="sub-progress"><div class="progress-bar-outer"><div class="progress-bar-inner" id="sub-progress-bar"></div></div><div class="progress-info"><span class="progress-step" id="sub-progress-step"></span><span class="progress-pct" id="sub-progress-pct"></span></div></div>
      <div class="result" id="sub-res"></div>
      <div class="fg" id="sub-srt-group" style="display:none;margin-top:12px">
        <label>字幕内容</label>
        <select id="sub-srt-type" style="margin-bottom:6px">
          <option value="preview">字幕预览</option>
        </select>
      </div>
      <div class="divider" id="sub-divider" style="display:none"></div>
      <button class="btn btn-main" id="btn-burn" onclick="burnSubtitle()" style="display:none">烧录字幕</button>
      <div class="progress-wrap" id="burn-progress"><div class="progress-bar-outer"><div class="progress-bar-inner" id="burn-progress-bar"></div></div><div class="progress-info"><span class="progress-step" id="burn-progress-step"></span><span class="progress-pct" id="burn-progress-pct"></span></div></div>
      <div class="result" id="burn-res"></div>
      <div class="preview" id="burn-preview"></div>
    </div>
  </div>

  <!-- ==================== STEP 6: 背景音乐 ==================== -->
  <div class="step" id="step6">
    <div class="step-header">
      <div class="step-num" id="sn6">6</div>
      <div class="step-title">背景音乐生成</div>
    </div>
    <select class="history-select" id="history-bgm" onchange="onHistorySelect('bgm', this.value)"></select>
    <div class="step-body">
      <div class="fg">
        <label>背景音乐音量</label>
        <input type="number" id="bgm-vol" value="0.2" min="0" max="1" step="0.05">
        <div class="hint">推荐范围 0.2-0.5</div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>BGM 曲目</label>
          <div style="display:flex;gap:6px">
            <select id="bgm-track" style="flex:1"><option value="">加载中...</option></select>
            <button class="btn btn-outline btn-sm" onclick="refreshTracks()">刷新</button>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:14px">
        <div class="cb">
          <input type="checkbox" id="bgm-custom-check">
          <label for="bgm-custom-check">自定义添加BGM</label>
        </div>
        <div class="cb">
          <input type="checkbox" id="bgm-none-check">
          <label for="bgm-none-check">不使用BGM</label>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>淡出秒数</label>
          <input type="number" id="bgm-fade" value="2.0" min="0" step="0.5">
        </div>
        <div class="fg">
          <label>原音量</label>
          <input type="number" id="bgm-orig" value="1.0" min="0" max="1" step="0.05">
        </div>
      </div>
      <button class="btn btn-main" id="btn-bgm" onclick="addBgm()">自动生成BGM</button>
      <div class="progress-wrap" id="bgm-progress"><div class="progress-bar-outer"><div class="progress-bar-inner" id="bgm-progress-bar"></div></div><div class="progress-info"><span class="progress-step" id="bgm-progress-step"></span><span class="progress-pct" id="bgm-progress-pct"></span></div></div>
      <div class="result" id="bgm-res"></div>
      <div class="preview" id="bgm-preview"></div>
    </div>
  </div>

</div>

<div class="log-bar">
  <span class="dot" id="logDot"></span>
  <span id="logText">就绪</span>
</div>

<script>
const API = window.location.origin;

// ── Global state (file IDs passed between steps) ──
const _defaultState = {
  projectId: null,      // Current project ID
  scriptText: '',       // Step 1/2 output
  douyinVideoFileId: null, // Step 1 source video
  audioFileId: null,    // Step 3 output
  videoFileId: null,    // Step 4 output (digital human video)
  uploadVideoFileId: null, // Step 4 uploaded custom video
  srtFileId: null,      // Step 5 SRT output
  burnedVideoFileId: null, // Step 5 burned video
  finalVideoFileId: null,  // Current latest video file_id
  selectedRecords: {     // Currently selected record_id per step
    douyin: null, script: null, voice: null,
    digital_human: null, subtitle: null, bgm: null,
  },
};
const state = Object.assign({}, _defaultState, JSON.parse(localStorage.getItem('mv_state') || '{}'));

function saveState() { localStorage.setItem('mv_state', JSON.stringify(state)); }

// Cached full project data from server (with all step records)
let _projectData = null;

// Step parent chain: bgm → subtitle → digital_human → voice → script → douyin
const _stepParentMap = {
  douyin: null,
  script: 'douyin',
  voice: 'script',
  digital_human: 'voice',
  subtitle: 'digital_human',
  bgm: 'subtitle',
};
const _stepOrder = ['douyin', 'script', 'voice', 'digital_human', 'subtitle', 'bgm'];
const _stepToNum = { douyin: 1, script: 2, voice: 3, digital_human: 4, subtitle: 5, bgm: 6 };

// ── Utils ──
function log(msg) { document.getElementById('logText').textContent = msg; }
function $(id) { return document.getElementById(id); }

function showRes(id, data, isErr) {
  const el = $(id);
  el.className = 'result show ' + (isErr ? 'err' : 'ok');
  el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
}
function hideRes(id) { const el = $(id); if (el) { el.className = 'result'; el.textContent = ''; } }

function markDone(n) { $('sn' + n).classList.add('done'); }
function markUndone(n) { $('sn' + n).classList.remove('done'); }

/**
 * When a step is re-done, clear all downstream step state and UI.
 * Step dependency chain: 1→2→3→4→5→6
 */
const _stepDownstream = {
  1: { state: ['scriptText','douyinVideoFileId','audioFileId','videoFileId','uploadVideoFileId','srtFileId','burnedVideoFileId','finalVideoFileId'],
       ui: ['dy-res','tts-res','dh-res','sub-res','burn-res','bgm-res','rewrite-res'],
       previews: ['dy-preview','tts-preview','dh-preview','burn-preview','bgm-preview'],
       steps: [2,3,4,5,6] },
  2: { state: ['audioFileId','videoFileId','uploadVideoFileId','srtFileId','burnedVideoFileId','finalVideoFileId'],
       ui: ['tts-res','dh-res','sub-res','burn-res','bgm-res'],
       previews: ['tts-preview','dh-preview','burn-preview','bgm-preview'],
       steps: [3,4,5,6] },
  3: { state: ['videoFileId','uploadVideoFileId','srtFileId','burnedVideoFileId','finalVideoFileId'],
       ui: ['dh-res','sub-res','burn-res','bgm-res'],
       previews: ['dh-preview','burn-preview','bgm-preview'],
       steps: [4,5,6] },
  4: { state: ['srtFileId','burnedVideoFileId','finalVideoFileId'],
       ui: ['sub-res','burn-res','bgm-res'],
       previews: ['burn-preview','bgm-preview'],
       steps: [5,6] },
  5: { state: ['finalVideoFileId'],
       ui: ['bgm-res'],
       previews: ['bgm-preview'],
       steps: [6] },
};

function invalidateDownstream(fromStep) {
  const ds = _stepDownstream[fromStep];
  if (!ds) return;
  ds.state.forEach(k => { state[k] = _defaultState[k]; });
  ds.ui.forEach(hideRes);
  ds.previews.forEach(id => { $(id).innerHTML = ''; });
  ds.steps.forEach(markUndone);
  // Clear downstream selectedRecords; keep history dropdowns but deselect
  const fromIdx = fromStep; // 1-based
  _stepOrder.forEach((step, i) => {
    if ((i + 1) > fromIdx) {
      state.selectedRecords[step] = null;
      const sel = $('history-' + step);
      if (sel && sel.options.length) {
        sel.selectedIndex = -1;
      }
    }
  });
  if (fromStep <= 4) {
    $('sub-divider').style.display = 'none';
    $('btn-burn').style.display = 'none';
  }
  saveState();
}

function resetUI() {
  // Clear all step outputs and previews
  ['dy-res','tts-res','dh-res','sub-res','burn-res','bgm-res','rewrite-res'].forEach(hideRes);
  $('dy-preview').innerHTML = '';
  $('dy-existing-preview').innerHTML = '';
  $('dy-existing-projects').style.display = 'none';
  $('dy-existing-projects').innerHTML = '';
  $('dy-existing').selectedIndex = 0;
  $('btn-dy-existing').disabled = true;
  $('btn-dy-existing').style.background = 'var(--bg3)';
  $('btn-dy-existing').style.color = 'var(--text)';
  $('btn-dy-existing').style.border = '1px solid var(--border)';
  $('tts-preview').innerHTML = '';
  $('dh-preview').innerHTML = '';
  $('burn-preview').innerHTML = '';
  $('bgm-preview').innerHTML = '';
  $('script-text').value = '';
  $('dy-link').value = '';
  $('sub-divider').style.display = 'none';
  $('btn-burn').style.display = 'none';
  $('upload-video-info').style.display = 'none';
  // Hide all history dropdowns
  _stepOrder.forEach(step => {
    const sel = $('history-' + step);
    if (sel) { sel.innerHTML = ''; sel.classList.remove('show'); }
  });
  for (let i = 1; i <= 6; i++) markUndone(i);
}

function applyStateToUI() {
  resetUI();
  // Step 1: douyin transcript
  if (state.scriptText) {
    $('script-text').value = state.scriptText;
    markDone(1);
  }
  // Step 2: script confirmed/rewritten (only if step 2 has its own record)
  if (state.selectedRecords.script) {
    markDone(2);
  }
  if (state.douyinVideoFileId) {
    showRes('dy-res', '(已恢复) 素材视频: ' + state.douyinVideoFileId);
    const link = document.createElement('div');
    link.style.cssText = 'text-align:center;padding:8px';
    link.innerHTML = '<a href="javascript:void(0)" style="color:var(--purple);font-size:13px">点击查看素材视频</a>';
    link.querySelector('a').onclick = function() { $('dy-preview').innerHTML = videoPlayer(state.douyinVideoFileId); };
    $('dy-preview').innerHTML = '';
    $('dy-preview').appendChild(link);
  } else if (state.scriptText) {
    showRes('dy-res', '(已恢复) 文案已加载');
  }
  // Step 3: audio
  if (state.audioFileId) {
    $('tts-preview').innerHTML = audioPlayer(state.audioFileId);
    showRes('tts-res', '(已恢复) file_id: ' + state.audioFileId);
    markDone(3);
  }
  // Step 4: digital human video
  if (state.videoFileId) {
    $('dh-preview').innerHTML = videoPlayer(state.videoFileId);
    showRes('dh-res', '(已恢复) file_id: ' + state.videoFileId);
    markDone(4);
  }
  if (state.uploadVideoFileId) {
    $('upload-video-info').style.display = 'block';
    $('upload-video-tag').textContent = 'file_id: ' + state.uploadVideoFileId;
  }
  // Step 5: subtitle
  if (state.srtFileId) {
    showRes('sub-res', '(已恢复) SRT file_id: ' + state.srtFileId);
    $('sub-divider').style.display = 'block';
    $('btn-burn').style.display = 'block';
    markDone(5);
  }
  if (state.burnedVideoFileId) {
    $('burn-preview').innerHTML = videoPlayer(state.burnedVideoFileId);
  }
  // Step 6: final video with BGM
  if (state.finalVideoFileId && state.finalVideoFileId !== state.videoFileId) {
    showRes('bgm-res', '(已恢复) file_id: ' + state.finalVideoFileId);
    $('bgm-preview').innerHTML = videoPlayer(state.finalVideoFileId);
    markDone(6);
  }
}

// Format helpers
function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

// ── Project management ──
async function loadProjectList() {
  try {
    const r = await api('GET', '/api/v1/projects');
    if (!r.success) return;
    const sel = $('project-select');
    // Keep only the placeholder option
    sel.innerHTML = '<option value="">-- 选择项目 --</option>';
    (r.data || []).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.project_id;
      const title = p.title ? p.title.substring(0, 30) : '未命名项目';
      opt.textContent = title + ' (' + fmtTime(p.updated_at) + ', ' + p.steps_done + '步)';
      if (p.project_id === state.projectId) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch (e) {
    console.warn('Failed to load projects:', e);
  }
}

function createNewProject() {
  // Just reset UI — project will be created lazily by ensureProject() when first step completes
  Object.assign(state, _defaultState);
  state.selectedRecords = { douyin: null, script: null, voice: null, digital_human: null, subtitle: null, bgm: null };
  _projectData = null;
  saveState();
  resetUI();
  $('project-select').value = '';
  log('已重置，开始新流程');
}

async function deleteCurrentProject() {
  if (!state.projectId) { log('没有选中的项目'); return; }
  if (!confirm('确认删除当前项目？')) return;
  try {
    await api('DELETE', '/api/v1/projects/' + state.projectId);
    Object.assign(state, _defaultState);
    state.selectedRecords = { douyin: null, script: null, voice: null, digital_human: null, subtitle: null, bgm: null };
    _projectData = null;
    saveState();
    resetUI();
    await loadProjectList();
    log('项目已删除');
  } catch (e) { log('删除失败: ' + e.message); }
}

async function onProjectSelect(projectId) {
  if (!projectId) {
    // Deselected — clear state
    Object.assign(state, _defaultState);
    state.selectedRecords = { douyin: null, script: null, voice: null, digital_human: null, subtitle: null, bgm: null };
    _projectData = null;
    saveState();
    resetUI();
    log('已取消选择项目');
    return;
  }
  try {
    const r = await api('GET', '/api/v1/projects/' + projectId);
    if (!r.success) { log('加载项目失败'); return; }
    restoreProjectData(r.data);
    log('已加载项目: ' + (r.data.title || projectId));
  } catch (e) { log('加载项目失败: ' + e.message); }
}

function restoreProjectData(proj) {
  // Map project steps back to state
  Object.assign(state, _defaultState);
  state.selectedRecords = { douyin: null, script: null, voice: null, digital_human: null, subtitle: null, bgm: null };
  state.projectId = proj.project_id;
  _projectData = proj;
  const s = proj.steps || {};

  // Helper: normalize step value to array (handle legacy dict or new list)
  function getRecords(step) {
    const val = s[step];
    if (!val) return [];
    if (Array.isArray(val)) return val;
    // Legacy dict: wrap it
    return [val];
  }

  // Step 1 (douyin): pick the latest record as the starting point
  const douyinRecs = getRecords('douyin');
  if (douyinRecs.length) {
    const latest = douyinRecs[douyinRecs.length - 1];
    state.selectedRecords.douyin = latest.record_id || null;
    state.scriptText = latest.transcript || '';
    state.douyinVideoFileId = latest.video_file_id || null;
  }

  // Steps 2-6: follow parent_record_id chain from upstream selection
  const chainSteps = ['script', 'voice', 'digital_human', 'subtitle', 'bgm'];
  for (const step of chainSteps) {
    const recs = getRecords(step);
    if (!recs.length) continue;
    const parentStep = _stepParentMap[step];
    const parentRecordId = state.selectedRecords[parentStep];
    // Find records matching the parent chain
    const matching = recs.filter(r => r.parent_record_id === parentRecordId);
    const chosen = matching.length ? matching[matching.length - 1] : null;
    if (!chosen) continue;
    state.selectedRecords[step] = chosen.record_id || null;
    // Apply chosen record to state
    if (step === 'script') {
      state.scriptText = chosen.text || state.scriptText;
    } else if (step === 'voice') {
      state.audioFileId = chosen.file_id || null;
    } else if (step === 'digital_human') {
      // Skip records with no generated file_id (upload-only)
      if (!chosen.file_id) { state.selectedRecords[step] = null; continue; }
      state.videoFileId = chosen.file_id || null;
      state.finalVideoFileId = chosen.file_id || null;
      state.uploadVideoFileId = chosen.upload_video_file_id || null;
    } else if (step === 'subtitle') {
      state.srtFileId = chosen.srt_file_id || null;
      if (chosen.burned_file_id) {
        state.burnedVideoFileId = chosen.burned_file_id;
        state.finalVideoFileId = chosen.burned_file_id;
      }
    } else if (step === 'bgm') {
      if (chosen.file_id) {
        state.finalVideoFileId = chosen.file_id;
      }
    }
  }

  saveState();
  applyStateToUI();

  // Render history dropdowns AFTER applyStateToUI (which calls resetUI)
  _stepOrder.forEach(step => {
    const recs = getRecords(step);
    if (recs.length > 1) {
      renderHistoryDropdown(step, recs);
    }
  });
}

/** Save a step result to the current project on the server. */
async function saveStep(step, data) {
  if (!state.projectId) return;
  try {
    // Determine parent_record_id from upstream step
    const parentStep = _stepParentMap[step];
    const parentRecordId = parentStep ? (state.selectedRecords[parentStep] || null) : null;
    const r = await api('PUT', '/api/v1/projects/' + state.projectId + '/steps/' + step, {
      data,
      parent_record_id: parentRecordId,
    });
    if (r.success && r.data) {
      // Update cached project data and find new record_id
      _projectData = r.data;
      const records = r.data.steps[step];
      if (Array.isArray(records) && records.length) {
        const newRecord = records[records.length - 1];
        state.selectedRecords[step] = newRecord.record_id;
        saveState();
        renderHistoryDropdown(step, records);
      }
    }
    // Refresh project list to update title/steps count
    loadProjectList();
  } catch (e) {
    console.warn('Failed to save step:', e);
  }
}

/** Render history dropdown for a step. */
function renderHistoryDropdown(step, records) {
  const sel = $('history-' + step);
  if (!sel) return;
  if (!records || records.length <= 1) {
    sel.classList.remove('show');
    sel.innerHTML = '';
    return;
  }
  sel.classList.add('show');
  sel.innerHTML = records.map((r, i) => {
    const num = i + 1;
    const time = r.created_at ? fmtTime(r.created_at) : '';
    let info = '';
    if (step === 'douyin') info = (r.transcript || '').substring(0, 20);
    else if (step === 'script') info = (r.text || '').substring(0, 20);
    else if (step === 'voice') info = r.file_id ? r.file_id.substring(0, 8) : '';
    else if (step === 'digital_human') info = r.file_id ? r.file_id.substring(0, 8) : '';
    else if (step === 'subtitle') info = r.srt_file_id ? r.srt_file_id.substring(0, 8) : '';
    else if (step === 'bgm') info = r.file_id ? r.file_id.substring(0, 8) : '';
    const label = '#' + num + ' · ' + time + (info ? ' · ' + info : '');
    const selected = (r.record_id === state.selectedRecords[step]) ? ' selected' : '';
    return '<option value="' + (r.record_id || i) + '"' + selected + '>' + label + '</option>';
  }).join('');
}

/** Handle history dropdown selection change. */
function onHistorySelect(step, recordId) {
  if (!_projectData) return;
  const records = _projectData.steps[step];
  if (!Array.isArray(records)) return;
  const record = records.find(r => r.record_id === recordId);
  if (!record) return;

  state.selectedRecords[step] = recordId;

  // Update state and UI based on step type
  if (step === 'douyin') {
    state.scriptText = record.transcript || '';
    state.douyinVideoFileId = record.video_file_id || null;
    $('script-text').value = state.scriptText;
    if (state.douyinVideoFileId) {
      showRes('dy-res', '(已切换) 素材视频: ' + state.douyinVideoFileId);
      $('dy-preview').innerHTML = videoPlayer(state.douyinVideoFileId);
    } else {
      showRes('dy-res', '(已切换) 文案已加载');
      $('dy-preview').innerHTML = '';
    }
  } else if (step === 'script') {
    state.scriptText = record.text || '';
    $('script-text').value = state.scriptText;
    showRes('rewrite-res', '(已切换) 文案已加载');
  } else if (step === 'voice') {
    state.audioFileId = record.file_id || null;
    if (state.audioFileId) {
      $('tts-preview').innerHTML = audioPlayer(state.audioFileId);
      showRes('tts-res', '(已切换) file_id: ' + state.audioFileId);
    }
  } else if (step === 'digital_human') {
    state.videoFileId = record.file_id || null;
    state.uploadVideoFileId = record.upload_video_file_id || null;
    state.finalVideoFileId = record.file_id || null;
    if (state.videoFileId) {
      $('dh-preview').innerHTML = videoPlayer(state.videoFileId);
      showRes('dh-res', '(已切换) file_id: ' + state.videoFileId);
    }
  } else if (step === 'subtitle') {
    state.srtFileId = record.srt_file_id || null;
    state.burnedVideoFileId = record.burned_file_id || null;
    if (record.burned_file_id) state.finalVideoFileId = record.burned_file_id;
    if (state.srtFileId) {
      showRes('sub-res', '(已切换) SRT file_id: ' + state.srtFileId);
      $('sub-divider').style.display = 'block';
      $('btn-burn').style.display = 'block';
    }
    if (state.burnedVideoFileId) {
      $('burn-preview').innerHTML = videoPlayer(state.burnedVideoFileId);
    } else {
      $('burn-preview').innerHTML = '';
    }
  } else if (step === 'bgm') {
    if (record.file_id) {
      state.finalVideoFileId = record.file_id;
      $('bgm-preview').innerHTML = videoPlayer(record.file_id);
      showRes('bgm-res', '(已切换) file_id: ' + record.file_id);
    }
  }

  // Update downstream: find matching records by parent chain
  _updateDownstreamAfterSelect(step);
  saveState();
}

/** After selecting a record in step, update downstream steps to match. */
function _updateDownstreamAfterSelect(fromStep) {
  const fromIdx = _stepOrder.indexOf(fromStep);
  if (fromIdx < 0) return;
  for (let i = fromIdx + 1; i < _stepOrder.length; i++) {
    const step = _stepOrder[i];
    const parentStep = _stepParentMap[step];
    const parentRecordId = state.selectedRecords[parentStep];
    const records = _projectData?.steps[step];
    if (!Array.isArray(records) || !records.length) {
      state.selectedRecords[step] = null;
      continue;
    }
    // Find records whose parent matches
    const matching = records.filter(r => r.parent_record_id === parentRecordId);
    if (matching.length) {
      const latest = matching[matching.length - 1];
      state.selectedRecords[step] = latest.record_id;
      renderHistoryDropdown(step, records);
      $('history-' + step).value = latest.record_id;
      // Apply record to state
      _applyRecordToState(step, latest);
    } else {
      // No matching downstream records — clear UI but keep history dropdown
      state.selectedRecords[step] = null;
      _clearStepUI(step);
      renderHistoryDropdown(step, records);
    }
  }
}

function _applyRecordToState(step, record) {
  if (step === 'script') {
    state.scriptText = record.text || '';
    $('script-text').value = state.scriptText;
  } else if (step === 'voice') {
    state.audioFileId = record.file_id || null;
    if (state.audioFileId) {
      $('tts-preview').innerHTML = audioPlayer(state.audioFileId);
      showRes('tts-res', '(已恢复) file_id: ' + state.audioFileId);
      markDone(3);
    }
  } else if (step === 'digital_human') {
    state.videoFileId = record.file_id || null;
    state.finalVideoFileId = record.file_id || null;
    state.uploadVideoFileId = record.upload_video_file_id || null;
    if (state.videoFileId) {
      $('dh-preview').innerHTML = videoPlayer(state.videoFileId);
      showRes('dh-res', '(已恢复) file_id: ' + state.videoFileId);
      markDone(4);
    }
  } else if (step === 'subtitle') {
    state.srtFileId = record.srt_file_id || null;
    state.burnedVideoFileId = record.burned_file_id || null;
    if (record.burned_file_id) state.finalVideoFileId = record.burned_file_id;
    if (state.srtFileId) {
      showRes('sub-res', '(已恢复) SRT file_id: ' + state.srtFileId);
      $('sub-divider').style.display = 'block';
      $('btn-burn').style.display = 'block';
      markDone(5);
    }
    if (state.burnedVideoFileId) $('burn-preview').innerHTML = videoPlayer(state.burnedVideoFileId);
  } else if (step === 'bgm') {
    if (record.file_id) {
      state.finalVideoFileId = record.file_id;
      $('bgm-preview').innerHTML = videoPlayer(record.file_id);
      showRes('bgm-res', '(已恢复) file_id: ' + record.file_id);
      markDone(6);
    }
  }
}

function _clearStepUI(step) {
  const num = _stepToNum[step];
  markUndone(num);
  if (step === 'voice') {
    hideRes('tts-res'); $('tts-preview').innerHTML = '';
    state.audioFileId = null;
  } else if (step === 'digital_human') {
    hideRes('dh-res'); $('dh-preview').innerHTML = '';
    state.videoFileId = null; state.finalVideoFileId = null;
  } else if (step === 'subtitle') {
    hideRes('sub-res'); hideRes('burn-res'); $('burn-preview').innerHTML = '';
    state.srtFileId = null; state.burnedVideoFileId = null;
    $('sub-divider').style.display = 'none'; $('btn-burn').style.display = 'none';
  } else if (step === 'bgm') {
    hideRes('bgm-res'); $('bgm-preview').innerHTML = '';
  }
}

/** Ensure a project exists; creates one if needed. Returns projectId. */
async function ensureProject() {
  if (state.projectId) return state.projectId;
  const r = await api('POST', '/api/v1/projects', { title: '' });
  if (!r.success) throw new Error('创建项目失败');
  state.projectId = r.data.project_id;
  saveState();
  loadProjectList();
  return state.projectId;
}

async function restoreState() {
  // Load project list and existing videos in parallel
  await Promise.all([loadProjectList(), loadExistingVideos()]);
  // If we had a project selected, fetch latest data from server
  if (state.projectId) {
    try {
      const r = await api('GET', '/api/v1/projects/' + state.projectId);
      if (r.success) {
        restoreProjectData(r.data);
        log('已从服务端恢复项目状态');
        return;
      }
    } catch (e) {
      console.warn('Failed to restore from server, using local state:', e);
    }
    // Fallback: server unreachable or project deleted, use local state
    if (state.scriptText || state.audioFileId || state.videoFileId) {
      applyStateToUI();
      log('已从本地恢复项目状态');
    }
  }
}

async function api(method, path, body) {

  if (body instanceof FormData) { opts.body = body; }
  else if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const resp = await fetch(API + path, opts);
  return await resp.json();
}

// ── Task polling ──
const STATUS_LABELS = { queued: '排队中', processing: '处理中', completed: '已完成', failed: '失败', cancelled: '已取消' };

function showProgress(prefix, step, progress, message) {
  const wrap = $(prefix + '-progress');
  if (!wrap) return;
  wrap.classList.add('show');
  $(prefix + '-progress-bar').style.width = progress + '%';
  $(prefix + '-progress-step').textContent = message || step || '';
  $(prefix + '-progress-pct').textContent = progress > 0 ? progress + '%' : '';
}

function hideProgress(prefix) {
  const wrap = $(prefix + '-progress');
  if (wrap) wrap.classList.remove('show');
}

/**
 * Poll a task until completed or failed.
 * Returns the task result on success, throws on failure.
 */
async function pollTask(taskId, prefix, logPrefix) {
  const INTERVAL = 1500;
  showProgress(prefix, '排队中', 0, '任务已提交，等待处理...');
  log(logPrefix + ' - 任务 ' + taskId + ' 排队中...');

  while (true) {
    await new Promise(r => setTimeout(r, INTERVAL));
    let task;
    try {
      const r = await api('GET', '/api/v1/tasks/' + taskId);
      if (!r.success) {
        hideProgress(prefix);
        throw new Error(r.error?.message || '任务查询失败');
      }
      task = r.data;
    } catch (e) {
      if (e.message && e.message.includes('任务查询失败')) throw e;
      // Network error, keep polling
      continue;
    }

    const status = task.status;
    const step = task.step || '';
    const progress = task.progress || 0;
    const message = task.message || STATUS_LABELS[status] || status;

    showProgress(prefix, step, progress, message);
    log(logPrefix + ' - ' + message + (progress > 0 ? ' (' + progress + '%)' : ''));

    if (status === 'completed') {
      showProgress(prefix, step, 100, '完成!');
      setTimeout(() => hideProgress(prefix), 2000);
      return task.result;
    }
    if (status === 'failed' || status === 'cancelled') {
      hideProgress(prefix);
      throw new Error(task.error || '任务' + STATUS_LABELS[status]);
    }
  }
}

async function douyinExtract() {
  const link = $('dy-link').value.trim();
  if (!link) { showRes('dy-res', '请输入抖音分享链接', true); return; }
  loading('btn-dy-extract', true);
  log('正在提取抖音视频文案...');
  try {
    await ensureProject();
    const r = await api('POST', '/api/v1/douyin/transcribe', { share_link: link });
    if (!r.success) { showRes('dy-res', r.error?.message || '提取失败', true); log('文案提取失败'); loading('btn-dy-extract', false); return; }

    // Async task: poll for result
    const taskId = r.data.task_id;
    const result = await pollTask(taskId, 'dy', '文案提取');

    invalidateDownstream(1);
    showRes('dy-res', result);
    const stepData = { transcript: '', files: [] };
    if (result.transcript) {
      $('script-text').value = result.transcript;
      state.scriptText = result.transcript;
      stepData.transcript = result.transcript;
    }
    if (result.files?.length) {
      stepData.files = result.files;
      const vf = result.files.find(f => f.filename?.endsWith('.mp4'));
      if (vf) {
        stepData.video_file_id = vf.file_id;
        state.douyinVideoFileId = vf.file_id;
        $('dy-preview').innerHTML = videoPlayer(vf.file_id);
      }
    }
    saveState();
    saveStep('douyin', stepData);
    markDone(1);
    log('文案提取完成');
    loadExistingVideos();
  } catch (e) { showRes('dy-res', e.message, true); log('文案提取失败: ' + e.message); }
  loading('btn-dy-extract', false);
}

// ── STEP 2: Rewrite ──
async function rewriteScript() {
  const mode = document.querySelector('input[name="rewrite-mode"]:checked')?.value;
  const text = $('script-text').value.trim();
  if (!text) { showRes('rewrite-res', '请先输入文案内容', true); return; }

  if (mode === 'none') {
    invalidateDownstream(2);
    state.scriptText = text;
    saveState();
    saveStep('script', { text });
    markDone(2);
    showRes('rewrite-res', '文案已确认（未改写）');
    log('文案确认完成');
    return;
  }

  loading('btn-rewrite', true);
  log('正在改写文案...');
  try {
    let r;
    if (mode === 'auto') {
      r = await api('POST', '/api/v1/rewrite/auto', { text });
    } else {
      const instruction = $('rewrite-instruction').value.trim();
      if (!instruction) { showRes('rewrite-res', '请输入改写指令', true); loading('btn-rewrite', false); return; }
      r = await api('POST', '/api/v1/rewrite/instruction', { text, instruction });
    }
    if (r.success) {
      invalidateDownstream(2);
      const newText = r.data.rewritten_text || '';
      $('script-text').value = newText;
      state.scriptText = newText;
      saveState();
      saveStep('script', { text: newText });
      showRes('rewrite-res', '改写完成');
      markDone(2);
      log('文案改写完成');
    } else {
      showRes('rewrite-res', r.error?.message || '改写失败', true);
      log('改写失败');
    }
  } catch (e) { showRes('rewrite-res', e.message, true); log('请求失败'); }
  loading('btn-rewrite', false);
}

// ── STEP 3: Audio (TTS) ──
async function generateAudio() {
  const text = $('script-text').value.trim();
  if (!text) { showRes('tts-res', '请先在步骤2填写文案', true); return; }
  const speaker = $('v-speaker').value;
  const speed = parseFloat($('v-speed').value) || 1.0;
  const promptFile = $('v-prompt-audio').files[0];
  const promptText = $('v-prompt-text').value.trim();

  loading('btn-tts', true);
  log('正在生成音频...');
  try {
    let r;
    if (promptFile && promptText) {
      const fd = new FormData();
      fd.append('text', text);
      fd.append('prompt_text', promptText);
      fd.append('speed', speed);
      fd.append('prompt_wav', promptFile);
      r = await api('POST', '/api/v1/voice/zero-shot', fd);
    } else {
      if (!speaker) { showRes('tts-res', '请选择音色', true); loading('btn-tts', false); return; }
      r = await api('POST', '/api/v1/voice/synthesize', { text, speaker, speed });
    }
    if (!r.success) { showRes('tts-res', r.error?.message || '生成失败', true); log('音频生成失败'); loading('btn-tts', false); return; }

    const taskId = r.data.task_id;
    const result = await pollTask(taskId, 'tts', '音频生成');

    invalidateDownstream(3);
    state.audioFileId = result.file_id;
    saveState();
    saveStep('voice', { file_id: result.file_id });
    showRes('tts-res', result);
    $('tts-preview').innerHTML = audioPlayer(result.file_id);
    markDone(3);
    log('音频生成完成: ' + result.file_id);
  } catch (e) { showRes('tts-res', e.message, true); log('音频生成失败: ' + e.message); }
  loading('btn-tts', false);
}

// ── STEP 4: Generate digital human video ──
async function generateVideo() {
  const audioId = $('dh-audio-override').value.trim() || state.audioFileId;
  if (!audioId) { showRes('dh-res', '请先在步骤3生成音频，或手动填入音频file_id', true); return; }

  const batchSize = parseInt($('dh-batch').value, 10);
  const syncOffset = parseInt($('dh-sync-offset').value, 10);
  const scaleH = parseFloat($('dh-scale-h').value);
  const scaleW = parseFloat($('dh-scale-w').value);

  const body = {
    audio_file_id: audioId,
    batch_size: Number.isFinite(batchSize) && batchSize > 0 ? batchSize : 4,
    sync_offset: Number.isFinite(syncOffset) ? syncOffset : 0,
    scale_h: Number.isFinite(scaleH) ? scaleH : 1.6,
    scale_w: Number.isFinite(scaleW) ? scaleW : 3.6,
    compress_inference: $('dh-compress').checked,
    beautify_teeth: $('dh-beautify-teeth').checked,
    runtime: $('dh-runtime').value || 'auto',
  };

  if (state.uploadVideoFileId) {
    body.video_file_id = state.uploadVideoFileId;
  } else {
    const face = $('dh-face').value;
    if (face) body.face = face;
  }

  loading('btn-dh', true);
  log('正在生成数字人视频...');
  try {
    const r = await api('POST', '/api/v1/digital-human/generate', body);
    if (!r.success) { showRes('dh-res', r.error?.message || '生成失败', true); log('视频生成失败'); loading('btn-dh', false); return; }

    const taskId = r.data.task_id;
    const result = await pollTask(taskId, 'dh', '数字人视频');

    invalidateDownstream(4);
    state.videoFileId = result.file_id;
    state.finalVideoFileId = result.file_id;
    saveState();
    saveStep('digital_human', { file_id: result.file_id, upload_video_file_id: state.uploadVideoFileId || null });
    showRes('dh-res', result);
    $('dh-preview').innerHTML = videoPlayer(result.file_id);
    markDone(4);
    log('视频生成完成: ' + result.file_id + ' (' + (result.elapsed_seconds||'?') + 's)');
  } catch (e) { showRes('dh-res', e.message, true); log('视频生成失败: ' + e.message); }
  loading('btn-dh', false);
}

    $('burn-preview').innerHTML = videoPlayer(result.file_id);
    log('字幕烧录完成: ' + result.file_id);
  } catch (e) { showRes('burn-res', e.message, true); log('字幕烧录失败: ' + e.message); }
  loading('btn-burn', false);
}

// ── STEP 6: BGM ──
async function addBgm() {
  if ($('bgm-none-check').checked) {
    showRes('bgm-res', '已跳过背景音乐');
    markDone(6);
    log('跳过BGM');
    return;
  }

  const videoId = state.finalVideoFileId;
  if (!videoId) { showRes('bgm-res', '请先完成前面的步骤生成视频', true); return; }

  const body = {
    video_file_id: videoId,
    bgm_volume: parseFloat($('bgm-vol').value) || 0.2,
    original_volume: parseFloat($('bgm-orig').value) || 1.0,
    loop_bgm: true,
    fade_out_seconds: parseFloat($('bgm-fade').value) || 2.0,
  };

  const trackName = $('bgm-track').value;
  if (trackName && !$('bgm-custom-check').checked) {
    body.bgm_name = trackName;
  } else {
    body.random_choice = true;
  }

  loading('btn-bgm', true);
  log('正在混合背景音乐...');
  try {
    const r = await api('POST', '/api/v1/bgm/mix', body);
    if (!r.success) { showRes('bgm-res', r.error?.message || '混合失败', true); log('BGM 混合失败'); loading('btn-bgm', false); return; }

    const taskId = r.data.task_id;
    const result = await pollTask(taskId, 'bgm', 'BGM混合');

    state.finalVideoFileId = result.file_id;
    saveState();
    saveStep('bgm', { file_id: result.file_id });
    showRes('bgm-res', result);
    $('bgm-preview').innerHTML = videoPlayer(result.file_id);
    markDone(6);
    log('BGM 混合完成: ' + (result.track_name || ''));
  } catch (e) { showRes('bgm-res', e.message, true); log('BGM 混合失败: ' + e.message); }
  loading('btn-bgm', false);
}
</script>
